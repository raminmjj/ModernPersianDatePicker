name: Publish to NuGet

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.0.0)'
        required: true

permissions:
  id-token: write   
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG="${GITHUB_REF#refs/tags/v}"
            echo "VERSION=$TAG" >> $GITHUB_OUTPUT
          fi
      
      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build src/ModernPersianDatePicker -c Release --no-restore

      - name: Test
        run: dotnet test tests/ModernPersianDatePicker.Tests -c Release --no-restore

      - name: Pack
        run: dotnet pack src/ModernPersianDatePicker -c Release --no-build -p:Version=${{ steps.version.outputs.VERSION }} -o ./artifacts

      - name: NuGet Login (Trusted Publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
